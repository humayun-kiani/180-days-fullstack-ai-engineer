# nginx.conf — Reverse proxy configuration

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream expense_api {
        server api:8000;            # 'api' is the service name in docker-compose
        keepalive 32;               # keep 32 connections alive
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy all requests to FastAPI
        location / {
            proxy_pass http://expense_api;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Health check endpoint — bypass rate limiting
        location /health {
            proxy_pass http://expense_api/health;
            limit_req_bypass 1;
        }
    }
}